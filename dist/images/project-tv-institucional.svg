<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#7c3aed"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid4)"/>
  
  <!-- TV/Media Icon -->
  <g transform="translate(250, 150)">
    <!-- TV Screen -->
    <rect x="20" y="20" width="60" height="40" fill="white" rx="4"/>
    <rect x="25" y="25" width="50" height="30" fill="#7c3aed"/>
    <!-- Play Button -->
    <polygon points="40,35 40,45 50,40" fill="white"/>
    <!-- TV Stand -->
    <rect x="45" y="60" width="10" height="15" fill="white"/>
    <rect x="35" y="70" width="30" height="5" fill="white"/>
    <!-- Antenna -->
    <path d="M30 20 L25 10 M70 20 L75 10" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">TV Institucional</text>
  <text x="300" y="350" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="16">Corporate Media Platform</text>
</svg>
