<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#1e40af"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Law Icon -->
  <g transform="translate(250, 150)">
    <!-- Scale of Justice -->
    <rect x="45" y="0" width="10" height="100" fill="white"/>
    <!-- Left Scale -->
    <circle cx="20" cy="20" r="15" fill="none" stroke="white" stroke-width="2"/>
    <path d="M5 20 L35 20" stroke="white" stroke-width="2"/>
    <path d="M20 5 L20 35" stroke="white" stroke-width="2"/>
    <!-- Right Scale -->
    <circle cx="80" cy="20" r="15" fill="none" stroke="white" stroke-width="2"/>
    <path d="M65 20 L95 20" stroke="white" stroke-width="2"/>
    <path d="M80 5 L80 35" stroke="white" stroke-width="2"/>
    <!-- Connecting Lines -->
    <path d="M20 20 L50 10 L80 20" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">FGV Law</text>
  <text x="300" y="350" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="16">Legal Education Platform</text>
</svg>
