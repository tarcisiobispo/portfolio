<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#dc2626"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid3)"/>
  
  <!-- Auto Parts Icon -->
  <g transform="translate(250, 150)">
    <!-- Gear -->
    <circle cx="50" cy="50" r="25" fill="none" stroke="white" stroke-width="4"/>
    <circle cx="50" cy="50" r="10" fill="white"/>
    <!-- Gear Teeth -->
    <g fill="white">
      <rect x="48" y="20" width="4" height="10"/>
      <rect x="48" y="70" width="4" height="10"/>
      <rect x="20" y="48" width="10" height="4"/>
      <rect x="70" y="48" width="10" height="4"/>
      <rect x="32" y="32" width="6" height="6" transform="rotate(45 35 35)"/>
      <rect x="62" y="32" width="6" height="6" transform="rotate(45 65 35)"/>
      <rect x="32" y="62" width="6" height="6" transform="rotate(45 35 65)"/>
      <rect x="62" y="62" width="6" height="6" transform="rotate(45 65 65)"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="300" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Taliparts</text>
  <text x="300" y="350" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="16">Auto Parts E-commerce</text>
</svg>
