<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#059669"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid2)"/>
  
  <!-- Education Icon -->
  <g transform="translate(250, 150)">
    <!-- Book -->
    <rect x="20" y="30" width="60" height="40" fill="white" rx="4"/>
    <rect x="25" y="35" width="50" height="30" fill="#059669"/>
    <path d="M30 45 L70 45 M30 50 L70 50 M30 55 L60 55" stroke="white" stroke-width="2"/>
    <!-- Graduation Cap -->
    <path d="M10 25 L50 15 L90 25 L50 35 Z" fill="white"/>
    <rect x="85" y="20" width="8" height="20" fill="white"/>
    <circle cx="93" cy="18" r="3" fill="white"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Direito GV</text>
  <text x="300" y="350" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="16">Academic Portal</text>
</svg>
