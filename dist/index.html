    <!-- GitHub Pages SPA script -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

      // Defer CSS não crítico após LCP
      function loadDeferredCSS() {
        const links = document.querySelectorAll('link[rel="preload"][as="style"]');
        links.forEach(link => {
          link.rel = 'stylesheet';
          link.removeAttribute('as');
        });
      }

      // Carregar CSS após LCP ou 3 segundos
      if (document.readyState === 'complete') {
        setTimeout(loadDeferredCSS, 100);
      } else {
        window.addEventListener('load', () => setTimeout(loadDeferredCSS, 100));
      }
    </script>
